// ─── CONSULTORIOS ─────────────────────────────────────────────────────────────
function Consultorios({consultorios, onSave, onUpdate, onDel}) {
  const EMPTY = {nombre:'', direccion:'', telefono:'', comision:0, notas:''};
  const [showForm, setShowForm] = useState(false);
  const [form, setForm]         = useState({...EMPTY});
  const [editId, setEditId]     = useState(null);
  const [saving, setSaving]     = useState(false);

  const PALETA = ['#52b788','#e9c46a','#e76f51','#4a90d9','#9b59b6','#1abc9c','#e74c3c','#3498db'];
  const colorIdx = i => PALETA[i % PALETA.length];

  const abrirNuevo = () => { setForm({...EMPTY}); setEditId(null); setShowForm(true); };
  const abrirEditar = (ct) => { setForm({nombre:ct.nombre,direccion:ct.direccion||'',telefono:ct.telefono||'',comision:ct.comision||0,notas:ct.notas||''}); setEditId(ct.id); setShowForm(true); };
  const cerrar = () => { setShowForm(false); setEditId(null); setForm({...EMPTY}); };

  const guardar = async () => {
    if (!form.nombre.trim()) { swalError('Nombre requerido','Ingresá un nombre para el consultorio'); return; }
    const com = Number(form.comision)||0;
    if (com < 0 || com > 100) { swalError('Comisión inválida','Debe ser un valor entre 0 y 100'); return; }
    setSaving(true);
    const data = {...form, comision: com};
    if (editId) { await onUpdate(editId, data); }
    else        { await onSave(data); }
    setSaving(false);
    cerrar();
  };

  const campo = (key, label, type='text', placeholder='') => div({className:'form-group'},
    lbl({}, label),
    inp({type, value:form[key]||'', placeholder, onChange:ev=>setForm({...form,[key]:ev.target.value})})
  );

  return div({},
    // Header
    div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
      div({},
        e('p',{style:{fontSize:'.875rem',color:'var(--text-muted)',marginTop:4}}, consultorios.length+' consultorio(s) registrado(s)')
      ),
      Btn({onClick:abrirNuevo}, '+ Nuevo consultorio')
    ),

    // Aviso si sin consultorios
    consultorios.length === 0 && EmptyState({icon:'🏥', text:'Todavía no hay consultorios. Agregá uno para asignarlos a los turnos y calcular comisiones automáticamente.'}),

    // Grilla de cards
    div({className:'cons-grid'},
      ...consultorios.map((ct, i) => div({key:ct.id, className:'cons-card', style:{borderLeftColor:colorIdx(i)}},
        e('h3',{}, ct.nombre),
        ct.direccion && div({className:'cons-dir'}, '📍 '+ct.direccion),
        ct.telefono  && div({style:{fontSize:'.78rem',color:'var(--text-muted)',marginBottom:8}}, '📞 '+ct.telefono),
        div({style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
          div({className:'cons-comision'},
            Number(ct.comision||0) > 0
              ? '💸 Comisión: '+ct.comision+'%'
              : '✅ Sin comisión'
          ),
          Number(ct.comision||0) > 0 && span({style:{fontSize:'.72rem',color:'var(--text-muted)'}},
            '— Se descuenta automáticamente al cobrar'
          )
        ),
        ct.notas && div({style:{fontSize:'.78rem',color:'var(--text-muted)',marginTop:8,fontStyle:'italic'}}, ct.notas),
        div({className:'cons-actions'},
          Btn({cls:'btn-secondary',sm:true,onClick:()=>abrirEditar(ct)}, '✏️ Editar'),
          Btn({cls:'btn-danger',sm:true,onClick:()=>onDel(ct.id)}, '🗑 Eliminar')
        )
      ))
    ),

    // Modal form
    showForm && Modal({
      title: editId ? 'Editar consultorio' : 'Nuevo consultorio',
      onClose: cerrar,
      footer: div({},
        Btn({cls:'btn-secondary',onClick:cerrar}, 'Cancelar'),
        Btn({onClick:guardar, disabled:saving}, saving ? 'Guardando...' : (editId ? 'Guardar cambios' : 'Crear consultorio'))
      ),
      children: div({className:'form-grid'},
        div({className:'form-group full'},
          lbl({}, 'Nombre del consultorio'),
          inp({value:form.nombre, placeholder:'ej: Consultorio Centro', onChange:ev=>setForm({...form,nombre:ev.target.value})})
        ),
        campo('direccion','Dirección','text','ej: Av. Corrientes 1234'),
        campo('telefono','Teléfono','text','ej: 11-1234-5678'),
        div({className:'form-group'},
          lbl({}, 'Comisión del consultorio (%)'),
          inp({type:'number', min:0, max:100, step:0.5, value:form.comision||0,
            onChange:ev=>setForm({...form,comision:ev.target.value}),
            placeholder:'0 = sin comisión'
          }),
          div({style:{fontSize:'.72rem',color:'var(--text-muted)',marginTop:4}},
            Number(form.comision) > 0
              ? '💡 Se descontará '+form.comision+'% del monto de cada consulta cobrada en este consultorio'
              : '💡 Sin comisión — el monto cobrado es el ingreso neto completo'
          )
        ),
        div({className:'form-group full'},
          lbl({}, 'Notas'),
          e('textarea',{rows:2, value:form.notas||'', placeholder:'Horarios, condiciones, etc.', onChange:ev=>setForm({...form,notas:ev.target.value}), style:{width:'100%',padding:'10px 12px',border:'1.5px solid #e2e8e0',borderRadius:'var(--radius-sm)',fontFamily:'DM Sans,sans-serif',fontSize:'.875rem',resize:'vertical',outline:'none'}})
        )
      )
    })
  );
}

// ─── FORMS ────────────────────────────────────────────────────────────────────
function FormPaciente({onSave, onCancel}) {
  const [f, setF] = useState({nombre:'',apellido:'',email:'',telefono:'',edad:'',peso:'',talla:'',objetivo:'Perdida de peso',dni:'',estado:'Activo',notas:'',sexo:'F'});
  const field = (k,lbl_,type='text',opts=null) => div({key:k,className:'form-group'},
    lbl({},lbl_),
    opts ? e('select',{value:f[k],onChange:ev=>setF({...f,[k]:ev.target.value})}, ...opts.map(o=>e('option',{key:o},o)))
    : inp({type,value:f[k],onChange:ev=>setF({...f,[k]:ev.target.value})})
  );
  return Card({children:[
    div({className:'card-header'}, span({className:'card-title'},'Nuevo paciente')),
    div({className:'card-body'}, div({className:'form-grid'},
      field('nombre','Nombre'), field('apellido','Apellido'), field('email','Email','email'), field('telefono','Teléfono'),
      field('edad','Edad','number'), field('sexo','Sexo','text',['F','M','Otro']),
      field('peso','Peso (kg)','number'), field('talla','Talla (cm)','number'),
      field('objetivo','Objetivo','text',['Perdida de peso','Control colesterol','Diabetes tipo 2','Aumento muscular','Alimentacion saludable','Otro']),
      field('dni','DNI / CUIL'), field('estado','Estado','text',['Activo','Inactivo']),
      div({className:'form-group full'}, lbl({},'Notas'), e('textarea',{rows:3,value:f.notas,onChange:ev=>setF({...f,notas:ev.target.value})}))
    )),
    div({className:'modal-footer'}, Btn({cls:'btn-secondary',onClick:onCancel},'Cancelar'), Btn({onClick:()=>{if(!f.nombre||!f.apellido)return swalError('Campos requeridos','Nombre y apellido son obligatorios'); onSave({...f,imc:imc(f.peso,f.talla),fechaAlta:today(),ultimaConsulta:'',consultas:[],planes:[],hc:{}});}},'Guardar paciente'))
  ]});
}

function FormTurno({pacs, consultorios, onSave, onCancel, onAddPac}) {
  const [f, setF] = useState({
    pacienteId:'', pacienteNombre:'', fecha:today(), hora:'09:00',
    tipo:'Consulta de seguimiento', estado:'Confirmado', monto:15000,
    notas:'', consultorioId:'', consultorioNombre:''
  });
  // Sub-form nuevo paciente
  const [mostrarNuevoPac, setMostrarNuevoPac] = useState(false);
  const [np, setNp] = useState({nombre:'',apellido:'',email:'',telefono:'',edad:'',sexo:'F',peso:'',talla:'',objetivo:'Perdida de peso',dni:''});
  const [guardandoPac, setGuardandoPac] = useState(false);

  const campoNp = (k, lbl_, type='text', opts=null) => div({key:k, className:'form-group'},
    lbl({}, lbl_),
    opts ? e('select',{value:np[k], onChange:ev=>setNp({...np,[k]:ev.target.value})},
              ...opts.map(o=>e('option',{key:o},o)))
         : inp({type, value:np[k], onChange:ev=>setNp({...np,[k]:ev.target.value})})
  );

  const crearPaciente = async () => {
    if (!np.nombre || !np.apellido) { swalError('Campos requeridos','Nombre y apellido son obligatorios'); return; }
    setGuardandoPac(true);
    try {
      const datos = {...np, imc:imc(np.peso,np.talla), fechaAlta:today(), ultimaConsulta:'', consultas:[], planes:[], estado:'Activo', notas:'', hc:{}};
      const nuevo = await onAddPac(datos);
      setF({...f, pacienteId:nuevo.id, pacienteNombre:np.nombre+' '+np.apellido});
      setMostrarNuevoPac(false);
      setNp({nombre:'',apellido:'',email:'',telefono:'',edad:'',sexo:'F',peso:'',talla:'',objetivo:'Perdida de peso',dni:''});
      Swal.fire({icon:'success',title:'¡Paciente creado!',text:np.nombre+' '+np.apellido+' fue agregado y seleccionado.',timer:2000,showConfirmButton:false});
    } catch(ex) { swalError('Error','No se pudo crear el paciente: '+ex.message); }
    setGuardandoPac(false);
  };

  return Card({children:[
    div({className:'card-header'}, span({className:'card-title'},'Nuevo turno')),
    div({className:'card-body'},
      // ── Selección de paciente ──────────────────────────────────────────────
      div({className:'form-group full'}, lbl({},'Paciente'),
        div({style:{display:'flex',gap:8,alignItems:'flex-start',flexWrap:'wrap'}},
          e('select',{
            value:f.pacienteId,
            onChange:ev=>{
              const p = pacs.find(p=>p.id===ev.target.value);
              setF({...f, pacienteId:ev.target.value, pacienteNombre:p ? p.nombre+' '+p.apellido : ''});
              if(mostrarNuevoPac) setMostrarNuevoPac(false);
            },
            style:{flex:1,minWidth:200}
          },
            e('option',{value:''},'Seleccionar paciente existente...'),
            ...pacs.map(p=>e('option',{key:p.id,value:p.id}, p.nombre+' '+p.apellido))
          ),
          e('button',{
            type:'button',
            className:'btn btn-secondary btn-sm',
            onClick:()=>{ setMostrarNuevoPac(!mostrarNuevoPac); setF({...f,pacienteId:'',pacienteNombre:''}); },
            style:{whiteSpace:'nowrap',flexShrink:0}
          }, mostrarNuevoPac ? '✕ Cancelar' : '+ Nuevo paciente')
        ),

        // Sub-form crear nuevo paciente
        mostrarNuevoPac && div({className:'nuevo-pac-box'},
          e('h4',{}, '👤 Datos del nuevo paciente'),
          div({className:'form-grid'},
            campoNp('nombre','Nombre'),
            campoNp('apellido','Apellido'),
            campoNp('email','Email','email'),
            campoNp('telefono','Teléfono'),
            campoNp('edad','Edad','number'),
            campoNp('sexo','Sexo','text',['F','M','Otro']),
            campoNp('peso','Peso (kg)','number'),
            campoNp('talla','Talla (cm)','number'),
            campoNp('objetivo','Objetivo','text',['Perdida de peso','Control colesterol','Diabetes tipo 2','Aumento muscular','Alimentacion saludable','Otro']),
            campoNp('dni','DNI / CUIL')
          ),
          div({style:{marginTop:12,display:'flex',gap:8}},
            Btn({cls:'btn-secondary',sm:true,onClick:()=>setMostrarNuevoPac(false)}, 'Cancelar'),
            Btn({sm:true,onClick:crearPaciente,disabled:guardandoPac}, guardandoPac ? 'Guardando...' : '✓ Crear y seleccionar')
          )
        )
      ),

      // ── Resto del formulario de turno ──────────────────────────────────────
      div({className:'form-grid',style:{marginTop:16}},
        div({className:'form-group'},lbl({},'Fecha'),inp({type:'date',value:f.fecha,onChange:ev=>setF({...f,fecha:ev.target.value})})),
        div({className:'form-group'},lbl({},'Hora'),inp({type:'time',value:f.hora,onChange:ev=>setF({...f,hora:ev.target.value})})),
        consultorios.length > 0 && div({className:'form-group'}, lbl({},'Consultorio'),
          e('select',{value:f.consultorioId,onChange:ev=>{
            const ct = consultorios.find(c=>c.id===ev.target.value);
            setF({...f, consultorioId:ev.target.value, consultorioNombre:ct ? ct.nombre : ''});
          }},
            e('option',{value:''},'Sin consultorio'),
            ...consultorios.map(ct=>e('option',{key:ct.id,value:ct.id}, ct.nombre))
          )
        ),
        div({className:'form-group'},lbl({},'Tipo'),
          e('select',{value:f.tipo,onChange:ev=>setF({...f,tipo:ev.target.value})},
            ...['Primera consulta','Consulta de seguimiento','Control mensual','Control de analisis','Videoconsulta'].map(o=>e('option',{key:o},o))
          )
        ),
        div({className:'form-group'},lbl({},'Monto (ARS)'),inp({type:'number',value:f.monto,onChange:ev=>setF({...f,monto:Number(ev.target.value)})})),
        div({className:'form-group'},lbl({},'Estado'),
          e('select',{value:f.estado,onChange:ev=>setF({...f,estado:ev.target.value})},
            e('option',{},'Confirmado'),e('option',{},'Pendiente'),e('option',{},'Cancelado')
          )
        ),
        div({className:'form-group full'},lbl({},'Notas'),inp({value:f.notas,onChange:ev=>setF({...f,notas:ev.target.value})}))
      )
    ),
    div({className:'modal-footer'},
      Btn({cls:'btn-secondary',onClick:onCancel},'Cancelar'),
      Btn({onClick:()=>{
        if(!f.pacienteId) return swalError('Seleccionar paciente','Debes elegir o crear un paciente para el turno');
        onSave(f);
      }}, 'Agendar turno')
    )
  ]});
}

function FormIngreso({onSave, onCancel}) {
  const [f, setF] = useState({descripcion:'',tipo:'consulta',fecha:today(),monto:'',metodoPago:'Transferencia'});
  return Card({children:[
    div({className:'card-header'}, span({className:'card-title'},'Registrar ingreso')),
    div({className:'card-body'}, div({className:'form-grid'},
      div({className:'form-group full'},lbl({},'Descripción'),inp({placeholder:'ej: Consulta - Nombre Paciente',value:f.descripcion,onChange:ev=>setF({...f,descripcion:ev.target.value})})),
      div({className:'form-group'},lbl({},'Tipo'),e('select',{value:f.tipo,onChange:ev=>setF({...f,tipo:ev.target.value})},e('option',{value:'consulta'},'Consulta'),e('option',{value:'ebook'},'Ebook'),e('option',{value:'pack'},'Pack'))),
      div({className:'form-group'},lbl({},'Método de pago'),e('select',{value:f.metodoPago,onChange:ev=>setF({...f,metodoPago:ev.target.value})},...['Transferencia','Efectivo','MercadoPago','Tarjeta débito','Tarjeta crédito'].map(o=>e('option',{key:o},o)))),
      div({className:'form-group'},lbl({},'Fecha'),inp({type:'date',value:f.fecha,onChange:ev=>setF({...f,fecha:ev.target.value})})),
      div({className:'form-group'},lbl({},'Monto (ARS)'),inp({type:'number',value:f.monto,onChange:ev=>setF({...f,monto:ev.target.value})}))
    )),
    div({className:'modal-footer'}, Btn({cls:'btn-secondary',onClick:onCancel},'Cancelar'), Btn({onClick:()=>{if(!f.descripcion||!f.monto)return swalError('Campos requeridos','Descripción y monto son obligatorios'); onSave({...f,monto:Number(f.monto)});}},'Registrar'))
  ]});
}

function FormEbook({onSave, onCancel}) {
  const [f, setF] = useState({titulo:'',precio:'',descripcion:''});
  return Card({children:[
    div({className:'card-header'}, span({className:'card-title'},'Nuevo ebook')),
    div({className:'card-body'}, div({className:'form-grid'},
      div({className:'form-group full'},lbl({},'Título'),inp({value:f.titulo,onChange:ev=>setF({...f,titulo:ev.target.value})})),
      div({className:'form-group'},lbl({},'Precio (ARS)'),inp({type:'number',value:f.precio,onChange:ev=>setF({...f,precio:ev.target.value})})),
      div({className:'form-group full'},lbl({},'Descripción'),e('textarea',{value:f.descripcion,onChange:ev=>setF({...f,descripcion:ev.target.value})}))
    )),
    div({className:'modal-footer'}, Btn({cls:'btn-secondary',onClick:onCancel},'Cancelar'), Btn({onClick:()=>{if(!f.titulo||!f.precio)return swalError('Campos requeridos','Título y precio son obligatorios'); onSave({...f,precio:Number(f.precio)});}},'Crear ebook'))
  ]});
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
createRoot(document.getElementById('root')).render(e(App));
</script>
