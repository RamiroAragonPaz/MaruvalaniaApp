<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MaruApp — Panel de Gestión</title>

<!-- PWA para iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="faf7f2">
<meta name="apple-mobile-web-app-title" content="MaruApp — Panel de Gestión">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#faf7f2">
<link rel="icon" type="image/png" sizes="32x32" href="maruapp.ico">
<link rel="icon" type="image/png" sizes="16x16" href="maruapp.ico">
<link rel="apple-touch-icon" href="maruapp.ico">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--brown-deep:#593A29; --brown-mid:#8b5c43; --brown-light:#d1baae; --green-pale:#b7e4c7;  --green-deep:#1a3a2a;--green-mid:#2d6a4f;--green-light:#52b788;--green-pale:#b7e4c7;--green-mist:#d8f3dc;--cream:#faf7f2;--cream-dark:#f0ebe1;--text-dark:#1a2515;--text-mid:#3d5a3e;--text-muted:#7a9b7c;--white:#fff;--shadow-sm:0 2px 8px rgba(26,58,42,.08);--shadow-lg:0 8px 40px rgba(26,58,42,.18);--radius:16px;--radius-sm:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
.loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--brown-deep)}
.loading-screen h1{color:var(--cream);font-size:1.8rem}
.spinner{width:36px;height:36px;border:3px solid rgba(228, 214, 183, 0.2);border-top-color:var(--brown-light);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.login-left{background:linear-gradient(160deg,var(--brown-deep) 0%,var(--brown-mid) 60%,#c7815b 100%);display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:60px;position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:rgba(255,255,255,.04);border-radius:50%}
.login-brand h1{color:var(--brown-light);font-size:2.4rem;line-height:1.1;margin-bottom:12px}
.login-brand .logo{font-size:2.8rem;margin-bottom:16px;display:block}
.login-brand p{color:var(--cream-dark);font-size:1rem;line-height:1.6;max-width:340px}
.login-features{margin-top:48px;display:flex;flex-direction:column;gap:14px}
.login-feature{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.7);font-size:.9rem}
.login-right{display:flex;align-items:center;justify-content:center;padding:48px;background:var(--cream)}
.login-form-wrap{width:100%;max-width:400px}
.login-form-wrap h2{font-size:1.6rem;margin-bottom:6px;color:var(--brown-deep)}
.login-form-wrap>p{font-size:.875rem;color:var(--brown-deep);margin-bottom:32px}
.login-form{display:flex;flex-direction:column;gap:16px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.78rem;font-weight:600;color:var(--brown-deep);text-transform:uppercase;letter-spacing:.8px}
.fg input{padding:12px 16px;border:1.5px solid #e2e8e0;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.95rem;background:white;outline:none;transition:border-color .2s}
.fg input:focus{border-color:var(--brown-light)}
.login-btn{margin-top:8px;padding:13px;background:var(--brown-mid);color:white;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(45,106,79,.35);width:100%}
.login-btn:hover{background:var(--brown-deep);transform:translateY(-1px)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:var(--radius-sm);font-size:.82rem;border:1px solid #fecaca}
.login-hint{margin-top:20px;padding:14px;background:var(--brown-light);border-radius:var(--radius-sm);font-size:.78rem;color:var(--brown-deep);line-height:1.6}
.login-hint code{background:rgba(0,0,0,.08);padding:1px 5px;border-radius:3px}
@media(max-width:768px){.login-page{grid-template-columns:1fr}.login-left{display:none}.login-right{padding:32px 24px}}
.app-shell{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--brown-deep);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{color:var(--cream);font-size:1.4rem;letter-spacing:-.5px}
.sidebar-logo span{display:block;font-size:.72rem;color:var(--cream-dark);font-weight:400;margin-top:2px;text-transform:uppercase;letter-spacing:1.5px}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-label{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--cream);padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);cursor:pointer;color:var(--cream);font-size:.9rem;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:var(--brown-mid);color:#fff;font-weight:500;box-shadow:0 2px 12px rgba(106, 78, 45, 0.4)}
.nav-item .icon{font-size:1.1rem;width:22px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.user-badge{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.06);border-radius:var(--radius-sm)}
.uav{width:34px;height:34px;background:var(--brown-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.85rem;color:white;flex-shrink:0}
.uav.adm{background:#e9c46a;color:var(--brown-deep)}
.user-info{flex:1;min-width:0}
.user-name{font-size:.82rem;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.role-badge.admin{background:rgba(233,196,106,.2);color:#e9c46a}
.role-badge.asistente{background:rgba(82,183,136,.2);color:var(--green-pale)}
.logout-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:.75rem;padding:6px;border-radius:4px;transition:all .2s;margin-top:6px;width:100%;text-align:left}
.logout-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.main{margin-left:260px;flex:1;min-height:100vh}
.topbar{background:var(--cream);padding:18px 32px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.35rem;color:var(--text-dark)}
.topbar p{font-size:.8rem;color:var(--text-muted);margin-top:2px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.page-content{padding:28px 32px}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:1.4rem;color:var(--text-dark)}
.overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.overlay-bg.show{display:block}
@media(max-width:768px){.hamburger{display:block}.sidebar{transform:translateX(-260px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.page-content{padding:20px 16px}.topbar{padding:14px 16px}}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--green-mid);color:white;box-shadow:0 2px 10px rgba(45,106,79,.3)}
.btn-primary:hover{background:var(--green-deep);transform:translateY(-1px)}
.btn-secondary{background:var(--cream-dark);color:var(--text-mid);border:1px solid #ddd}
.btn-secondary:hover{background:#e8e3da}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-ghost{background:transparent;color:var(--text-muted);padding:6px 10px}
.btn-ghost:hover{background:var(--cream-dark);color:var(--text-dark)}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.04)}
.card-header{padding:20px 24px 16px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:1rem;font-weight:600;color:var(--text-dark);font-family:'Playfair Display',serif}
.card-body{padding:20px 24px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px 22px;border:1px solid rgba(0,0,0,.04);box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green-light)}
.stat-card.a2::before{background:#74c69d}.stat-card.a3::before{background:#40916c}.stat-card.a4::before{background:#95d5b2}
.stat-icon{font-size:1.6rem;margin-bottom:10px;display:block}
.stat-value{font-size:1.7rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--text-dark)}
.stat-label{font-size:.78rem;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.8px}
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:2px solid var(--cream-dark)}
th{text-align:left;padding:10px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600}
td{padding:13px 16px;font-size:.875rem;border-bottom:1px solid var(--cream-dark)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500}
.bg{background:var(--green-mist);color:var(--green-mid)}
.by{background:#fef9c3;color:#a16207}
.br{background:#fee2e2;color:#dc2626}
.bb{background:#dbeafe;color:#1d4ed8}
.bgr{background:#f3f4f6;color:#6b7280}
.bgold{background:#fef3c7;color:#92400e}
.av{width:34px;height:34px;border-radius:50%;background:var(--green-pale);display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--green-deep);flex-shrink:0}
.av-sm{width:28px;height:28px;font-size:.7rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:.78rem;font-weight:500;color:var(--text-mid);text-transform:uppercase;letter-spacing:.8px}
input,select,textarea{padding:10px 14px;border:1.5px solid #e2e8e0;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.875rem;background:var(--cream);color:var(--text-dark);transition:border-color .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--green-light);background:white}
textarea{resize:vertical;min-height:80px}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}}
.modal-overlay{position:fixed;inset:0;background:rgba(26,58,42,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:22px 28px 16px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.15rem}
.modal-body{padding:24px 28px}
.modal-footer{padding:16px 28px;border-top:1px solid var(--cream-dark);display:flex;justify-content:flex-end;gap:10px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--cream-dark);margin-bottom:20px}
.tab-btn{padding:10px 18px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:var(--green-mid);border-bottom-color:var(--green-mid);font-weight:600}
.search-wrap{position:relative}
.search-wrap input{padding-left:36px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:1024px){.dashboard-grid{grid-template-columns:1fr}}
.turno-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:var(--radius-sm);background:var(--cream);border-left:3px solid var(--green-light);margin-bottom:8px}
.turno-item.pendiente{border-left-color:#fbbf24}
.turno-item.cancelado{border-left-color:#f87171}
.patient-header-card{background:linear-gradient(135deg,var(--green-deep) 0%,var(--green-mid) 100%);border-radius:var(--radius);padding:28px;color:white;margin-bottom:20px;display:flex;gap:20px;align-items:flex-start}
.patient-avatar-lg{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.patient-tag{background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;font-size:.72rem;margin:2px}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric-box{background:white;border-radius:var(--radius-sm);padding:14px 16px;text-align:center;box-shadow:var(--shadow-sm)}
.metric-val{font-size:1.4rem;font-weight:700;font-family:'Playfair Display',serif;color:var(--green-deep)}
.metric-label{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
@media(max-width:768px){.metrics-row{grid-template-columns:repeat(2,1fr)}.patient-header-card{flex-direction:column}}
.agenda-slot{display:grid;grid-template-columns:70px 1fr auto;align-items:center;gap:14px;padding:14px 18px;background:white;border-radius:var(--radius-sm);border-left:3px solid var(--green-light);box-shadow:var(--shadow-sm);margin-bottom:8px}
.agenda-slot.pendiente{border-left-color:#fbbf24}
.agenda-slot.cancelado{border-left-color:#f87171}
.consulta-timeline{position:relative;padding-left:24px}
.consulta-timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--green-pale)}
.consulta-item{position:relative;margin-bottom:20px}
.consulta-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--green-light);border:2px solid white}
.consulta-fecha{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.consulta-nota{font-size:.875rem;line-height:1.5}
.plan-card{background:var(--cream);border-radius:var(--radius-sm);padding:14px 18px;border-left:3px solid var(--green-light);margin-bottom:10px}
.plan-card h4{font-size:.9rem;font-weight:600;margin-bottom:4px}
.plan-card p{font-size:.78rem;color:var(--text-muted)}
.restricted-banner{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.82rem;color:#c2410c}
.ingreso-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ingreso-icon.consulta{background:var(--green-mist)}.ingreso-icon.ebook{background:#fef3c7}.ingreso-icon.pack{background:#dbeafe}
.usuario-card{display:flex;align-items:flex-start;gap:16px;padding:18px 20px;background:white;border-radius:var(--radius);border:1px solid rgba(0,0,0,.04);box-shadow:var(--shadow-sm);margin-bottom:12px}
.uavlg{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0}
.uavlg.admin{background:#fef3c7;color:#92400e}.uavlg.asistente{background:var(--green-mist);color:var(--green-deep)}
.permiso-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:.7rem;font-weight:500;margin:2px}
.permiso-on{background:var(--green-mist);color:var(--green-mid)}.permiso-off{background:#fee2e2;color:#dc2626}
.empty-state{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.875rem}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green-deep);color:white;padding:12px 20px;border-radius:var(--radius-sm);font-size:.875rem;z-index:9999;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.error{background:#dc2626}

/* CALENDARIO */
.cal-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,.04);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--cream-dark)}
.cal-header h4{font-size:.95rem;font-family:'Playfair Display',serif;color:var(--text-dark)}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:1rem;padding:4px 8px;border-radius:6px;transition:all .15s}
.cal-nav:hover{background:var(--cream-dark);color:var(--text-dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{padding:6px 2px;text-align:center;font-size:.65rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.cal-day{padding:5px 3px;min-height:36px;cursor:pointer;text-align:center;position:relative;transition:background .12s;border-radius:6px;margin:1px}
.cal-day:hover{background:var(--cream)}
.cal-day.empty{cursor:default}
.cal-day.today .cal-dn{background:var(--green-mid);color:white;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center}
.cal-day.selected{background:var(--green-mist)}
.cal-day.has-turnos::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:var(--green-light);border-radius:50%}
.cal-day.has-turnos.selected::after{background:var(--green-mid)}
.cal-dn{font-size:.78rem;font-weight:500;color:var(--text-dark);line-height:22px}
.cal-day.other-month .cal-dn{color:var(--text-muted);opacity:.4}
.cal-day.today.selected .cal-dn{background:var(--green-mid);color:white}


@media(max-width:1100px){
  .dash-main-grid{grid-template-columns:1fr 1fr!important}
  .dash-main-grid .cal-wrap{grid-column:1/-1}
}
@media(max-width:720px){
  .dash-main-grid{grid-template-columns:1fr!important}
  .agenda-cal-grid{grid-template-columns:1fr!important}
}


/* SweetAlert2 — tema NutriApp */
.swal2-popup { font-family: 'DM Sans', sans-serif !important; border-radius: 16px !important; }
.swal2-title { font-family: 'Playfair Display', serif !important; color: var(--text-dark) !important; }
.swal2-confirm { background: var(--green-mid) !important; border-radius: 10px !important; font-family: 'DM Sans', sans-serif !important; }
.swal2-cancel  { background: var(--cream-dark) !important; color: var(--text-mid) !important; border-radius: 10px !important; font-family: 'DM Sans', sans-serif !important; }
.swal2-icon.swal2-warning { border-color: #e9c46a !important; color: #e9c46a !important; }
.swal2-icon.swal2-success { border-color: var(--green-light) !important; color: var(--green-light) !important; }
.swal2-icon.swal2-error   { border-color: #e76f51 !important; color: #e76f51 !important; }
/* Btn editar */
.btn-edit { background: #e8f4fd; color: #2d7dd2; }
.btn-edit:hover { background: #cce3f8; }


/* Asistencia botones en TurnoCard */
.asist-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.asist-asistio{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.asist-asistio:hover{background:#a7f3d0}
.asist-no-asistio{background:#fee2e2;color:#991b1b;border-color:#fca5a5}

<script type="module">
// ─── IMPORTS ──────────────────────────────────────────────────────────────────
import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

         addDoc, updateDoc, deleteDoc,

const nowEs  = () => new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ─── PERMISOS ─────────────────────────────────────────────────────────────────
const PERMS = {
  admin:     { verPac:true,  editPac:true,  delPac:true,  editTurno:true, verFin:true, regIngreso:true, delIngreso:true, editEbook:true, adminUsers:true },
  asistente: { verPac:true,  editPac:false, delPac:false, editTurno:true, verFin:false, regIngreso:true, delIngreso:false, editEbook:false, adminUsers:false }
};

  ['Ver pacientes',true,true],['Editar datos clinicos',true,false],['Eliminar pacientes',true,false],
  ['Gestionar turnos',true,true],['Ver finanzas',true,false],['Registrar ingresos',true,true],
  ['Eliminar ingresos',true,false],['Editar ebooks',true,false],['Gestionar usuarios',true,false]
];

// ─── ELEMENT HELPERS ─────────────────────────────────────────────────────────
// Short alias: e('div', {className:'card'}, ...children)
const e = h; // React.createElement

const div  = (p,...c) => e('div',p,...c);
const span = (p,...c) => e('span',p,...c);
const img = (p,...c) => e('img',p,...c);
const btn  = (p,...c) => e('button',{type:'button',...p},...c);
const inp  = p => e('input',{type:'text',...p});
const sel  = (p,opts) => e('select',p,...opts.map(o => e('option',{key:o.v||o,value:o.v||o},o.l||o)));
const lbl  = (p,...c) => e('label',p,...c);
const td_  = (p,...c) => e('td',p,...c);
const th_  = (p,...c) => e('th',p,...c);
const tr_  = (p,...c) => e('tr',p,...c);

function FG({label, children}) {
  return div({className:'form-group'}, lbl({}, label), children);
}
function FGFull({label, children}) {
  return div({className:'form-group full'}, lbl({}, label), children);
}

// Btn, Badge, Card, Modal: llamados como funciones JS directas (no con e())
// El texto/children llega como 2do argumento, no dentro de props.
function Btn(props, ...rest) {
  const cls = props.cls || 'btn-primary';
  const sm  = props.sm;
  // children puede venir como rest[0] o como props.children
  const children = rest.length > 0 ? (rest.length === 1 ? rest[0] : rest) : props.children;
  return btn({className:'btn ' + cls + (sm ? ' btn-sm' : ''), onClick:props.onClick, disabled:props.disabled}, children);
}

function Badge(props, ...rest) {
  const children = rest.length > 0 ? (rest.length === 1 ? rest[0] : rest) : props.children;
  return span({className:'badge ' + props.cls}, children);
}

function Card(props, ...rest) {
  // Card siempre recibe children dentro de props como array: Card({children:[...]})
  const ch = props.children;
  return div({className:'card ' + (props.className || '')}, ...(Array.isArray(ch) ? ch : [ch]));
}

function EmptyState({icon, text}) {
  return div({className:'empty-state'}, div({className:'icon'}, icon), e('p',{}, text));
}

function Toast({msg, type, onClose}) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return div({className:'toast' + (type==='error' ? ' error' : ''),
    dangerouslySetInnerHTML:{__html:(type==='error'?'✕ ':'✓ ')+msg}
  });
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({title, onClose, footer, children}) {
  return div({className:'modal-overlay'},
    div({className:'modal'},
      div({className:'modal-header'},
        e('h3',{}, title),
        Btn({cls:'btn-ghost', onClick:onClose}, '✕')
      ),
      div({className:'modal-body'}, children),
      footer && div({className:'modal-footer'}, footer)
    )
  );
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────

function Login() {

  const doGoogleLogin = async () => {
    setError(''); setLoad(true);
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
      // Firebase se encargará de disparar el onAuthStateChanged en tu App principal
    } catch(ex) {
      setError("Error con Google: " + ex.message);
      setLoad(false);
    }
  };

  const doLogin = async () => {
    setError(''); setLoad(true);
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(ex) {
      const m = {'auth/user-not-found':'No existe cuenta con ese email','auth/wrong-password':'Contraseña incorrecta','auth/invalid-email':'Email invalido','auth/too-many-requests':'Demasiados intentos, espera un momento','auth/invalid-credential':'Email o contraseña incorrectos'};
      setError(m[ex.code] || ex.message); setLoad(false);
    }
  };
  
  const onKey = ev => { if (ev.key === 'Enter') doLogin(); };

  return div({className:'login-page'},
    div({className:'login-left'},
      div({className:'login-brand'},
        span({className:'logo'}),
        img({style:{width: '50px'}, src:'welcome2 (1).png'}),
        e('h1',{}, 'MaruApp'),
        e('p',{}, 'Panel de gestión profesional para nutricionistas.')
      ),
      div({className:'login-features'},
        ...['👥 Pacientes','📅 Agenda','💰 Finanzas','📚 Ebooks','🔐 Roles y permisos'].map(f =>
          div({className:'login-feature', key:f}, span({},f.split(' ')[0]), span({}, f.split(' ').slice(1).join(' ')))
        )
      )
    ),
    div({className:'login-right'},
      div({className:'login-form-wrap'},
        e('h2',{}, 'Bienvenida 🌿'),
        e('p',{}, 'Ingresa con tu cuenta para continuar'),
        div({className:'login-form'},
          error && div({className:'login-error'}, error),
          div({className:'fg'}, lbl({}, 'Email'), e('input',{type:'email', value:email, onChange:ev=>setEmail(ev.target.value), onKeyDown:onKey, placeholder:'tu@email.com', autoFocus:true})),
          div({className:'fg'}, lbl({}, 'Contraseña'), e('input',{type:'password', value:pass, onChange:ev=>setPass(ev.target.value), onKeyDown:onKey, placeholder:'••••••••'})),

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [authSt, setAuthSt]   = useState('loading');
  const [user,   setUser]     = useState(null);
  const [page,   setPage]     = useState('dashboard');
  const [selPac, setSelPac]   = useState(null);
  const [sidebar,setSidebar]  = useState(false);
  const [toast,  setToast]    = useState(null);
  const [pacs,   setPacs]     = useState([]);
  const [turnos, setTurnos]   = useState([]);
  const [ingresos,setIngresos]= useState([]);
  const [ebooks, setEbooks]   = useState([]);
  const [usuarios,setUsuarios]= useState([]);
  const [consultorios,setConsultorios] = useState([]);
  const [selPacTab,  setSelPacTab]  = useState('info');
  const [agendaFecha, setAgendaFecha] = useState(null); // fecha seleccionada en Agenda

  const showToast = (msg, type='success') => setToast({msg,type});
  const can = p => user && PERMS[user.rol]?.[p];
  const isAdmin = user?.rol === 'admin';

  // Auth listener
  useEffect(() => {
    return onAuthStateChanged(auth, async fireUser => {
      if (fireUser) {
        try {
          const snap = await getDoc(doc(db,'usuarios',fireUser.uid));
          if (snap.exists()) { setUser({uid:fireUser.uid, email:fireUser.email, ...snap.data()}); setAuthSt('in'); }
          else { showToast('Tu cuenta no tiene perfil. Contacta al administrador.','error'); await signOut(auth); setAuthSt('out'); }
        } catch(ex) { showToast('Error: '+ex.message,'error'); setAuthSt('out'); }
      } else { setUser(null); setAuthSt('out'); }
    });
  }, []);

  // Firestore listeners
  useEffect(() => {
    if (authSt !== 'in') return;
    const unsubs = [];
    const listen = (col, setter) => {
      const q = collection(db, col);
      unsubs.push(onSnapshot(q, s => setter(s.docs.map(d => ({id:d.id,...d.data()}))), err => console.warn(col,err.message)));
    };
    listen('pacientes', setPacs);
    listen('turnos', setTurnos);
    listen('ingresos', setIngresos);
    listen('ebooks', setEbooks);
    listen('consultorios', setConsultorios);
    if (isAdmin) {
      unsubs.push(onSnapshot(collection(db,'usuarios'), s => setUsuarios(s.docs.map(d=>({id:d.id,...d.data()}))), e=>console.warn(e)));
    }
    return () => unsubs.forEach(u => u());
  }, [authSt, isAdmin]);

  // Auto-carga de alquileres fijos al inicio del mes
  useEffect(() => {
    if (authSt !== 'in' || !isAdmin) return;
    const registrarAlquileres = async () => {
      const mes = mesNow(); // 'YYYY-MM'
      for (const ct of consultorios) {
        if (ct.tipoGasto !== 'alquiler' || !Number(ct.alquilerFijo)) continue;
        const flagId = 'alq_' + ct.id + '_' + mes.replace('-','');
        try {
          const flagRef = doc(db, 'alquileres', flagId);
          const flagSnap = await getDoc(flagRef);
          if (flagSnap.exists()) continue; // ya registrado este mes
          // Crear ingreso-egreso de alquiler
          await addDoc(collection(db,'ingresos'), {
            descripcion: 'Alquiler — ' + ct.nombre,
            tipo: 'alquiler',
            fecha: mes + '-01',
            monto: -Number(ct.alquilerFijo),
            montoNeto: -Number(ct.alquilerFijo),
            montoComision: 0,
            comisionPct: 0,
            consultorioId: ct.id,
            consultorioNombre: ct.nombre,
            metodoPago: 'Transferencia',
            origenAlquiler: true,
            creadoEn: serverTimestamp()
          });
          // Marcar como registrado
          await setDoc(flagRef, {consultorioId:ct.id, mes, registrado:true, creadoEn:serverTimestamp()});
        } catch(e) { console.warn('Auto-alquiler error:', e); }
      }
    };
    if (consultorios.length > 0) registrarAlquileres();
  }, [authSt, isAdmin, consultorios.length]);

  if (authSt === 'loading') return LoadingScreen();
  if (authSt === 'out') return e(React.Fragment, {}, e(Login), toast && e(Toast, {key:'t', msg:toast.msg, type:toast.type, onClose:()=>setToast(null)}) );

  // CRUD
  const addFB    = (col, data) => addDoc(collection(db,col), {...data, creadoEn:serverTimestamp()});
  const updateFB = (col, id, data) => updateDoc(doc(db,col,id), data);
  const delFB    = (col, id) => deleteDoc(doc(db,col,id));

  const navigate   = p => { setPage(p); setSidebar(false); if(p!=='paciente-detalle'){setSelPac(null);setSelPacTab('info');} };
  // Navegar a HC de un paciente directamente (desde Agenda u otro módulo)
  const abrirPacHC = pac => { setSelPac(pac); setSelPacTab('hc'); setPage('paciente-detalle'); setSidebar(false); };

  const navItems = [
    {id:'dashboard',icon:'🏠',label:'Inicio'},
    {id:'pacientes',icon:'👥',label:'Pacientes'},
    {id:'agenda',icon:'🗓️',label:'Agenda'},
    ...(can('verFin') ? [{id:'finanzas',icon:'💰',label:'Finanzas'}] : []),
    {id:'ebooks',icon:'📚',label:'Ebooks'},
    ...(isAdmin ? [{id:'consultorios',icon:'🏥',label:'Consultorios'}] : []),
    ...(isAdmin ? [{id:'usuarios',icon:'🔐',label:'Usuarios'}] : []),
  ];

  const titles = {dashboard:'Buen dia',pacientes:'Pacientes','paciente-detalle':'Ficha del paciente',agenda:'Agenda',finanzas:'Finanzas',ebooks:'Ebooks',usuarios:'Usuarios',consultorios:'Consultorios','add-paciente':'Nuevo paciente','add-turno':'Nuevo turno','add-ingreso':'Registrar ingreso','add-ebook':'Nuevo ebook'};

  return div({className:'app-shell'},
    sidebar && div({className:'overlay-bg show', onClick:()=>setSidebar(false)}),

    // SIDEBAR
    e('aside', {className:`sidebar${sidebar?' open':''}`},
      div({className:'sidebar-logo'}, img({style:{width: '15px'}, src:'welcome2 (1).png'}), e('h1',{}, 'MaruApp'), span({}, 'Panel de gestión')),
      e('nav', {className:'sidebar-nav'},
        div({className:'nav-label'}, 'Menú'),
        ...navItems.map(ni =>

          div({className:'user-info'},
            div({className:'user-name'}, user.nombre||user.email),
            span({className:`role-badge ${user.rol}`}, isAdmin?'Admin':'Asistente')
          )
        ),
        e('button',{className:'logout-btn', onClick:()=>signOut(auth)}, '🚪 Cerrar sesión')
      )
    ),

    // MAIN
    e('main', {className:'main'},
      div({className:'topbar'},
        div({style:{display:'flex',alignItems:'center',gap:12}},
          e('button',{className:'hamburger',onClick:()=>setSidebar(!sidebar)}, '☰'),
          div({},

        page==='pacientes' && e(Pacientes, {pacs,navigate,setSelPac,can,onDel:id=>swalConfirm('Eliminar paciente','Esta accion no se puede deshacer').then(r=>r.isConfirmed&&delFB('pacientes',id).then(()=>showToast('Paciente eliminado')))}),

        page==='agenda' && e(Agenda, {turnos,pacs,can,showToast,navigate,consultorios,abrirPacHC,onFechaChange:setAgendaFecha,
  onUpdate:(id,data)=>updateFB('turnos',id,data).then(()=>showToast('Turno actualizado')),

  onDel:id=>swalConfirm('Eliminar turno','El turno sera eliminado permanentemente').then(r=>r.isConfirmed&&delFB('turnos',id).then(()=>showToast('Turno eliminado')))

        page==='finanzas'&&can('verFin') && e(Finanzas, {ingresos,consultorios,can,onDel:id=>swalConfirm('Eliminar ingreso','Esta accion no se puede deshacer').then(r=>r.isConfirmed&&delFB('ingresos',id).then(()=>showToast('Ingreso eliminado')))}),

// ─── EXPORT EXCEL ─────────────────────────────────────────────────────────────
function exportXLS(filas, columnas, nombreArchivo) {
  // columnas: [{key, label}]
  const encabezado = columnas.map(c => c.label);
  const datos = filas.map(fila => columnas.map(c => fila[c.key] !== undefined ? fila[c.key] : ''));
  const hoja = XLSX.utils.aoa_to_sheet([encabezado, ...datos]);
  // Estilo: ancho de columnas
  hoja['!cols'] = columnas.map(() => ({ wch: 20 }));
  const libro = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(libro, hoja, 'Datos');
  XLSX.writeFile(libro, nombreArchivo + '.xlsx');
}

// ─── MINI CALENDARIO ──────────────────────────────────────────────────────────
function MiniCalendar({turnos, selectedDate, onSelectDate}) {
  const [viewYear,  setViewYear]  = useState(() => new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(() => new Date().getMonth());

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DIAS  = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

  const hoy = today();

  // Fechas con turnos este mes
  const mesStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const fechasConTurnos = new Set(turnos.filter(t=>(t.fecha||'').startsWith(mesStr)).map(t=>t.fecha));

  // Dias del mes
  const primerDia = new Date(viewYear, viewMonth, 1).getDay();
  const diasEnMes = new Date(viewYear, viewMonth+1, 0).getDate();
  const diasMesAnt = new Date(viewYear, viewMonth, 0).getDate();

  const cells = [];
  // Dias mes anterior
  for (let i = primerDia - 1; i >= 0; i--) {
    const d = diasMesAnt - i;
    const dateStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, dateStr, other:true});
  }
  // Dias este mes
  for (let d = 1; d <= diasEnMes; d++) {
    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, dateStr, other:false});
  }
  // Dias mes siguiente para completar grilla
  const remaining = 42 - cells.length;
  for (let d = 1; d <= remaining; d++) {
    const nm = viewMonth + 2 > 12 ? 1 : viewMonth + 2;
    const ny = viewMonth + 2 > 12 ? viewYear + 1 : viewYear;
    const dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, dateStr, other:true});
  }

  const prevMonth = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else{setViewMonth(m=>m-1);} };
  const nextMonth = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else{setViewMonth(m=>m+1);} };

  return div({className:'cal-wrap'},
    div({className:'cal-header'},
      e('button',{className:'cal-nav',onClick:prevMonth}, '‹'),
      e('h4',{}, MESES[viewMonth]+' '+viewYear),
      e('button',{className:'cal-nav',onClick:nextMonth}, '›')
    ),
    div({className:'cal-grid'},
      ...DIAS.map(d => div({key:d,className:'cal-dow'}, d))
    ),
    div({className:'cal-grid'},
      ...cells.map((cell,i) => {
        const isToday    = cell.dateStr === hoy;
        const isSelected = cell.dateStr === selectedDate;
        const hasTurnos  = fechasConTurnos.has(cell.dateStr);
        const cls = 'cal-day'
          + (cell.other  ? ' other-month' : '')
          + (isToday     ? ' today'       : '')
          + (isSelected  ? ' selected'    : '')
          + (hasTurnos   ? ' has-turnos'  : '');
        return div({key:i, className:cls, onClick:()=>!cell.other && onSelectDate(cell.dateStr)},
          div({className:'cal-dn'}, cell.d)
        );
      })
    )
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({pacs, turnos, ingresos, navigate, setSelPac, abrirPacHC, can}) {
  const hoy = today(), mes = mesNow();
  const [selFecha, setSelFecha] = useState(hoy);

  const thoy    = turnos.filter(t=>t.fecha===hoy).sort((a,b)=>a.hora.localeCompare(b.hora));
  const tSelDay = turnos.filter(t=>t.fecha===selFecha).sort((a,b)=>a.hora.localeCompare(b.hora));
  const ingMesBruto    = ingresos.filter(i=>(i.fecha||'').startsWith(mes)).reduce((s,i)=>s+Number(i.monto||0),0);
  const ingMesComision = ingresos.filter(i=>(i.fecha||'').startsWith(mes)).reduce((s,i)=>s+Number(i.montoComision||0),0);
  const ingMes = ingMesBruto - ingMesComision;

  // ── Pacientes para dar seguimiento (primera consulta confirmada hace 14–21 días) ──
  const hoyDate = new Date(hoy + 'T00:00:00');
  const seguimientoList = (() => {
    // Buscar turnos confirmados (asistio) cuya fecha esté entre 14 y 21 días atrás
    const resultado = [];
    const visto = new Set();
    turnos
      .filter(t => t.asistencia === 'asistio')
      .forEach(t => {
        if (!t.fecha || visto.has(t.pacienteId)) return;
        const diff = Math.round((hoyDate - new Date(t.fecha + 'T00:00:00')) / 86400000);
        if (diff >= 14 && diff <= 21) {
          const pac = pacs.find(p => p.id === t.pacienteId);
          if (pac) { resultado.push({pac, turno:t, diff}); visto.add(t.pacienteId); }
        }
      });
    return resultado.sort((a,b) => b.diff - a.diff);
  })();

  const statCard = (cls,icon,val,lbl_) => div({className:'stat-card '+cls,key:lbl_},
    span({className:'stat-icon'},icon),
    div({className:'stat-value',style:String(val).length>7?{fontSize:'1.2rem'}:{}}, String(val)),
    div({className:'stat-label'}, lbl_)
  );

  const dateLabel = d => {
    if (d === hoy) return 'hoy';
    try { return new Date(d+'T00:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}); } catch(e){ return d; }
  };

  return div({},
    div({className:'stats-grid', style:{gridTemplateColumns:'repeat(3,1fr)'}},
      statCard('a2','📅', thoy.length, 'Turnos hoy'),
      can('verFin')
        ? statCard('a3','💵', ars(ingMes), 'Ingresos netos del mes')
        : statCard('a3','🗓️', turnos.filter(t=>(t.fecha||'').startsWith(mes)).length, 'Turnos este mes'),
      statCard('a4','🌿', pacs.length, 'Total pacientes')
    ),

    // Fila principal: calendario + turnos del dia seleccionado
    div({className:'dash-main-grid',style:{display:'grid',gridTemplateColumns:'300px 1fr',gap:20,marginBottom:20}},
      e(MiniCalendar, {turnos, selectedDate:selFecha, onSelectDate:setSelFecha}),
      Card({children:[
        div({className:'card-header'},
          span({className:'card-title'}, 'Turnos — '+dateLabel(selFecha)),
          Btn({cls:'btn-ghost',sm:true,onClick:()=>navigate('agenda')}, 'Ver agenda')
        ),
        div({className:'card-body'},
          tSelDay.length===0
            ? EmptyState({icon:'📅',text:'Sin turnos este día'})
            : div({}, ...tSelDay.map(t=>
                div({key:t.id, className:'turno-item'+(t.estado==='Pendiente'?' pendiente':t.estado==='Cancelado'?' cancelado':'')},
                  span({style:{fontSize:'.8rem',fontWeight:600,color:'var(--green-mid)',minWidth:50}}, t.hora),
                  div({style:{flex:1}},
                    div({style:{fontWeight:500,fontSize:'.875rem'}}, t.pacienteNombre),
                    div({style:{fontSize:'.75rem',color:'var(--text-muted)'}}, t.tipo)
                  ),
                  Badge({cls:t.estado==='Confirmado'?'bg':t.estado==='Pendiente'?'by':'br'}, t.estado)
                )
              ))
        )
      ]})
    ),

    // ── Panel Dar Seguimiento ────────────────────────────────────────────────
    Card({children:[
      div({className:'card-header'},
        div({style:{display:'flex',alignItems:'center',gap:10}},
          span({className:'card-title'}, '🌿 Dar Seguimiento'),
          seguimientoList.length > 0 && span({style:{background:'#f59e0b',color:'white',borderRadius:20,fontSize:'.68rem',fontWeight:700,padding:'2px 8px'}}, seguimientoList.length)
        ),
        Btn({cls:'btn-ghost',sm:true,onClick:()=>navigate('pacientes')}, 'Ver pacientes')
      ),
      div({className:'card-body'},
        seguimientoList.length === 0
          ? div({style:{padding:'16px 0',textAlign:'center',color:'var(--text-muted)',fontSize:'.875rem'}},
              '✅ Sin pacientes pendientes de seguimiento en esta ventana (14–21 días post-consulta).'
            )
          : div({className:'seguimiento-list'},
              ...seguimientoList.map(({pac, turno, diff}) =>
                div({key:pac.id, className:'seguimiento-item'},
                  div({className:'seg-avatar'}, ini(pac.nombre, pac.apellido)),
                  div({className:'seg-info'},
                    div({className:'seg-nombre',
                      style:{cursor:'pointer'},
                      onClick:()=>{ setSelPac(pac); abrirPacHC(pac); }
                    }, pac.nombre+' '+pac.apellido),
                    div({className:'seg-detalle'},
                      'Última consulta: '+turno.fecha+' — '+turno.tipo,
                      pac.telefono && span({style:{marginLeft:8,color:'var(--green-mid)'}}, '📱 '+pac.telefono)

                  ),
                  span({className:'seg-dias'}, diff+' días'),
                  div({style:{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap'}},

                      className:'btn btn-sm',

                    }, '💬 WhatsApp'),
                    e('a',{
                      href: gcalSeguimientoUrl(pac, turno.fecha),
                      target:'_blank', rel:'noopener',
                      className:'btn btn-secondary btn-sm'
                    }, '📅 Agendar')
                  )
                )
              )
            )
      )
    ]}
  ));
}


// ─── PACIENTES ────────────────────────────────────────────────────────────────
function Pacientes({pacs, navigate, setSelPac, can, onDel}) {
  const [search,   setSearch]   = useState('');
  const [filter,   setFilter]   = useState('Todos');
  const [filtroEC, setFiltroEC] = useState(''); // estado clínico

  const EC_LABELS = {
    inicial:     {lbl:'Estado inicial',     emoji:'🟦', cls:'bb'},
    evaluacion:  {lbl:'Estado evaluación',  emoji:'🟨', cls:'by'},
    seguimiento: {lbl:'Estado seguimiento', emoji:'🟩', cls:'bg'},
  };

  const filtered = pacs.filter(p => {
    const q = search.toLowerCase();
    const matchText   = `${p.nombre} ${p.apellido} ${p.email||''}`.toLowerCase().includes(q);
    const matchEstado = filter==='Todos' || p.estado===filter;
    const matchEC     = !filtroEC || p.estadoClinico===filtroEC;
    return matchText && matchEstado && matchEC;
  });

  return div({},
    !can('delPac') && div({className:'restricted-banner'}, '🔒 Como asistente solo podés ver fichas y registrar consultas'),

    // Barra de filtros

        span({className:'search-icon'}, '🔍'),
        inp({placeholder:'Buscar por nombre, apellido o email...', value:search, onChange:ev=>setSearch(ev.target.value)})
      ),
      e('select',{value:filter,onChange:ev=>setFilter(ev.target.value),style:{width:'auto'}},
        e('option',{},'Todos'),e('option',{},'Activo'),e('option',{},'Inactivo')
      ),
      Btn({cls:'btn-secondary',sm:true,onClick:()=>exportXLS(
        filtered,
        [{key:'nombre',label:'Nombre'},{key:'apellido',label:'Apellido'},{key:'email',label:'Email'},
         {key:'telefono',label:'Teléfono'},{key:'edad',label:'Edad'},{key:'sexo',label:'Sexo'},
         {key:'peso',label:'Peso (kg)'},{key:'talla',label:'Talla (cm)'},{key:'imc',label:'IMC'},
         {key:'objetivo',label:'Objetivo'},{key:'dni',label:'DNI / CUIL'},
         {key:'estado',label:'Estado'},{key:'estadoClinico',label:'Estado Clínico'},
         {key:'fechaAlta',label:'Fecha Alta'},{key:'ultimaConsulta',label:'Última Consulta'}],
        'pacientes_nutriapp'
      )}, '📥 Exportar Excel')
    ),

    // Filtros rápidos por estado clínico
    div({style:{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap',alignItems:'center'}},
      span({style:{fontSize:'.72rem',fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.8px',marginRight:4}},'Estado clínico:'),
      e('button',{className:'ec-filter-btn'+(filtroEC===''?' active':''), onClick:()=>setFiltroEC('')}, 'Todos'),
      ...Object.entries(EC_LABELS).map(([val,{lbl,emoji}]) =>
        e('button',{
          key:val,
          className:'ec-filter-btn'+(filtroEC===val?' active':''),
          onClick:()=>setFiltroEC(filtroEC===val?'':val)
        }, emoji+' '+lbl)
      ),
      filtroEC && span({style:{fontSize:'.78rem',color:'var(--text-muted)',marginLeft:4}},
        filtered.length+' paciente'+(filtered.length!==1?'s':'')+' encontrado'+(filtered.length!==1?'s':'')
      )
    ),

    Card({children:[
      div({className:'table-wrap'},
        e('table',{},
          e('thead',{}, tr_({}, ...['Paciente','Edad','Estado clínico','IMC','DNI / CUIL','Última consulta','Estado',''].map(h=>th_({key:h},h)))),
          e('tbody',{}, ...filtered.map(p => {
            const ec = EC_LABELS[p.estadoClinico];
            return tr_({key:p.id},
              td_({}, div({style:{display:'flex',alignItems:'center',gap:10}},
                div({className:'av'},ini(p.nombre,p.apellido)),
                div({},
                  div({style:{fontWeight:500,cursor:'pointer',color:'var(--green-mid)'},onClick:()=>{setSelPac(p);navigate('paciente-detalle');}},`${p.nombre} ${p.apellido}`),
                  div({style:{fontSize:'.72rem',color:'var(--text-muted)'}},p.email)

                ? span({className:'badge '+(ec.cls)}, ec.emoji+' '+ec.lbl)
                : span({style:{fontSize:'.78rem',color:'var(--text-muted)'}}, '—')
              ),
              td_({}, span({style:{fontWeight:600,color:p.imc>25?'#dc2626':'var(--green-mid)'}},p.imc)),
              td_({style:{fontSize:'.82rem'}}, p.dni||'-'),
              td_({style:{fontSize:'.82rem',color:'var(--text-muted)'}}, p.ultimaConsulta||'-'),
              td_({}, Badge({cls:p.estado==='Activo'?'bg':'bgr'}, p.estado)),
              td_({}, div({style:{display:'flex',gap:6}},
                Btn({cls:'btn-ghost',sm:true,onClick:()=>{setSelPac(p);navigate('paciente-detalle');}}, 'Ver'),
                can('delPac') && Btn({cls:'btn-danger',sm:true,onClick:()=>onDel(p.id)}, '✕')
              ))

          filtered.length===0 && tr_({key:'e'}, td_({colSpan:8}, EmptyState({icon:'🔍',text:'No se encontraron pacientes'}))))
        )
      )
    ]}),
  );
}

  let vctHtml = '';
  if (pac.peso && pac.talla && pac.edad && hc.faf) {
    const sexo = (pac.sexo||'F').toUpperCase();

</div>

<h2>📊 Estado clínico</h2>

  const blob = new Blob([html], {type:'application/msword'});

}

// ─── PACIENTE DETALLE ─────────────────────────────────────────────────────────
function PacienteDetalle({pac, navigate, setSelPac, can, showToast, onUpdate, initialTab='info'}) {
  const [tab,    setTab]    = useState(initialTab||'info');
  const [edit,   setEdit]   = useState(false);
  const [form,   setForm]   = useState({...pac});
  const [showC,  setShowC]  = useState(false);
  const [showP,  setShowP]  = useState(false);
  const [nc,     setNc]     = useState({fecha:today(),nota:'',peso:''});
  const [np,     setNp]     = useState({nombre:'',tipo:'',fecha:today(),driveUrl:''});
  const [saving, setSaving] = useState(false);

  // ── Multi-HC: lista de historias clínicas del paciente ───────────────────
  const HC_INIT = {
    fechaConsulta: today(),
    estadoClinico:'',
    objetivo:'',
    comidas:'', actFisica:'', faf:'', alimentosRechaza:'',
    fumar:false, fumarDetalle:'', alcohol:false, alcoholDetalle:'', sal:false, salDetalle:'',
    sintomasPatologias:'', medicacion:'',
    lab:{ glucemia:'', colesterolTotal:'', hdl:'', ldl:'', trigliceridos:'', hemoglobina:'', ferritina:'', vitamD:'', tsh:'', urea:'', creatinina:'', otrosLab:'' }
  };

  const [historias,     setHistorias]     = useState([]);
  const [hcSelId,       setHcSelId]       = useState(null); // id de la HC seleccionada
  const [hc,            setHc]            = useState({...HC_INIT});
  const [hcEdit,        setHcEdit]        = useState(false);
  const [hcSaving,      setHcSaving]      = useState(false);
  const [showNuevaHC,   setShowNuevaHC]   = useState(false); // modal de nueva HC
  const [opcionNuevaHC, setOpcionNuevaHC] = useState('nueva'); // 'nueva' | 'copia'

  // Cargar colección historias_clinicas del paciente
  useEffect(() => {
    if (!pac?.id) return;
    const q = query(collection(db, 'pacientes', pac.id, 'historias_clinicas'), orderBy('fechaConsulta','desc'));
    const unsub = onSnapshot(q, snap => {
      const docs = snap.docs.map(d => ({id:d.id,...d.data()}));
      setHistorias(docs);
      // Si no hay HC seleccionada y hay docs, seleccionar la más reciente
      if (docs.length > 0 && !hcSelId) {
        setHcSelId(docs[0].id);
        setHc({...HC_INIT, ...docs[0]});
      }
    }, err => console.warn('HC listener:', err));
    return () => unsub();
  }, [pac.id]);

  // Cuando cambia la HC seleccionada, actualizar el estado local
  const seleccionarHC = (id) => {
    const found = historias.find(h => h.id === id);
    if (found) { setHcSelId(id); setHc({...HC_INIT, ...found}); setHcEdit(false); }
  };

  // Crear nueva HC
  const crearNuevaHC = async () => {
    let nuevaData = {...HC_INIT, fechaConsulta: today()};
    if (opcionNuevaHC === 'copia' && historias.length > 0) {
      const ultima = historias[0];
      const { id:_id, fechaConsulta:_fc, creadoEn:_ce, ...rest } = ultima;
      nuevaData = {...HC_INIT, ...rest, fechaConsulta: today()};
    }
    const ref = await addDoc(collection(db,'pacientes',pac.id,'historias_clinicas'), {...nuevaData, creadoEn:serverTimestamp()});
    setHcSelId(ref.id);
    setHc({...nuevaData, id:ref.id});
    setHcEdit(true);
    setShowNuevaHC(false);
    showToast('Nueva historia clínica creada');
  };

  const saveHC = async () => {
    setHcSaving(true);
    const { id: hcId, ...datos } = hc;
    if (hcSelId) {
      await updateDoc(doc(db,'pacientes',pac.id,'historias_clinicas',hcSelId), {...datos, actualizadoEn:serverTimestamp()});
    } else {
      const ref = await addDoc(collection(db,'pacientes',pac.id,'historias_clinicas'), {...datos, creadoEn:serverTimestamp()});
      setHcSelId(ref.id);
    }
    // Espejamos estadoClinico en el doc del paciente para poder filtrar desde la lista
    if (hc.estadoClinico) {
      await updateDoc(doc(db,'pacientes',pac.id), {estadoClinico: hc.estadoClinico});
      setSelPac({...pac, estadoClinico: hc.estadoClinico});
    }
    setHcEdit(false); setHcSaving(false); showToast('Historia clínica guardada');
  };



  const imcVal   = imc(pac.peso, pac.talla);
  const imcColor = imcVal==='-' ? 'var(--text-muted)' : imcVal<25 ? 'var(--green-mid)' : imcVal<30 ? '#d97706' : '#dc2626';
  const imcLbl   = imcVal==='-' ? '' : imcVal<18.5 ? 'Bajo peso' : imcVal<25 ? 'Normal' : imcVal<30 ? 'Sobrepeso' : 'Obesidad';

  const FAF_OPCIONES = [
    {val:'1.2',   lbl:'1.2 — Sedentario',           desc:'Sin ejercicio o muy poco'},
    {val:'1.375', lbl:'1.375 — Ligera',              desc:'1–3 días/semana'},
    {val:'1.55',  lbl:'1.55 — Moderada',             desc:'3–5 días/semana'},
    {val:'1.725', lbl:'1.725 — Intensa',             desc:'6–7 días/semana'},
    {val:'1.9',   lbl:'1.9 — Muy intensa',           desc:'Dos veces al día o trabajo físico'},
  ];

  // ── VCT Harris-Benedict ──────────────────────────────────────────────────
  const calcVCT = () => {
    const peso  = Number(pac.peso  || form.peso  || 0);
    const talla = Number(pac.talla || form.talla || 0);
    const edad  = Number(pac.edad  || form.edad  || 0);
    const sexo  = (pac.sexo || form.sexo || 'F').toUpperCase();
    const faf   = Number(hc.faf || 0);
    if (!peso || !talla || !edad || !faf) return null;
    const tmb = sexo === 'M'
      ? 66.5   + (13.75 * peso) + (5.003 * talla) - (6.775 * edad)   // Hombre
      : 655.1  + (9.563 * peso) + (1.850 * talla) - (4.676 * edad);  // Mujer
    return { tmb: Math.round(tmb), vct: Math.round(tmb * faf) };
  };

  const saveInfo = async () => {
    setSaving(true);
    await onUpdate(pac.id, {nombre:form.nombre,apellido:form.apellido,email:form.email,telefono:form.telefono,edad:form.edad,peso:form.peso,talla:form.talla,objetivo:form.objetivo,dni:form.dni,estado:form.estado,sexo:form.sexo,imc:imc(form.peso,form.talla)});
    setSelPac({...pac,...form}); setEdit(false); setSaving(false); showToast('Datos actualizados');
  };
  const saveConsulta = async () => {
    if(!nc.nota) return;
    const consultas = [{...nc,tipo:'manual'},...(pac.consultas||[])];
    await onUpdate(pac.id, {consultas, ultimaConsulta:nc.fecha, ...(nc.peso?{peso:Number(nc.peso)}:{})});
    setSelPac({...pac,consultas,ultimaConsulta:nc.fecha}); setShowC(false); setNc({fecha:today(),nota:'',peso:''}); showToast('Consulta registrada');
  };
  const savePlan = async () => {
    if(!np.nombre) return;
    const planes = [{...np},...(pac.planes||[])];
    await onUpdate(pac.id, {planes}); setSelPac({...pac,planes}); setShowP(false); setNp({nombre:'',tipo:'',fecha:today(),driveUrl:''}); showToast('Plan agregado');
  };
  const saveNotas = async () => {
    await onUpdate(pac.id, {notas:form.notas}); setSelPac({...pac,notas:form.notas}); setEdit(false); showToast('Notas guardadas');
  };

  const field = (k,lbl_) => div({key:k,className:'form-group'},
    lbl({},lbl_),
    edit&&can('editPac') ? inp({value:form[k]||'',onChange:ev=>setForm({...form,[k]:ev.target.value})})
    : div({style:{padding:'10px 14px',background:'var(--cream)',borderRadius:'var(--radius-sm)',fontSize:'.875rem'}}, pac[k]||'-')
  );

  // Helper para campos HC
  const hcTA = (key, label, rows=3) => div({className:'hc-campo'},
    e('label',{}, label),
    e('textarea',{rows, readOnly:!hcEdit, value:hc[key]||'', onChange:ev=>setHc({...hc,[key]:ev.target.value}), placeholder:hcEdit?'Escribir aquí...':''})
  );
  const hcINP = (key, label) => div({className:'hc-campo'},
    e('label',{}, label),
    e('input',{type:'text', readOnly:!hcEdit, value:hc[key]||'', onChange:ev=>setHc({...hc,[key]:ev.target.value}), placeholder:hcEdit?'—':''})
  );
  const hcLAB = (key, label) => div({className:'lab-item'},
    e('label',{}, label),
    e('input',{type:'text', readOnly:!hcEdit, value:(hc.lab||{})[key]||'', onChange:ev=>setHc({...hc,lab:{...(hc.lab||{}),[key]:ev.target.value}}), placeholder:hcEdit?'—':''})
  );
  const hcHABITO = (boolKey, detailKey, label) => div({className:'habito-row'},
    e('input',{type:'checkbox', id:'hab_'+boolKey, checked:!!(hc[boolKey]), disabled:!hcEdit, onChange:ev=>setHc({...hc,[boolKey]:ev.target.checked})}),
    e('label',{htmlFor:'hab_'+boolKey}, label),
    e('input',{type:'text', className:'habito-detail', disabled:!hcEdit||!hc[boolKey], placeholder:hc[boolKey]&&hcEdit?'Frecuencia / detalle...':'', value:hc[detailKey]||'', onChange:ev=>setHc({...hc,[detailKey]:ev.target.value})})
  );

  // Sección HC
  const HCSec = ({icono, titulo, children}) => div({className:'hc-seccion'},
    div({className:'hc-seccion-titulo'},
      e('span',{className:'icono'}, icono),
      e('h4',{}, titulo)
    ),
    children
  );

  return div({},
    div({style:{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}},
      Btn({cls:'btn-secondary',sm:true,onClick:()=>navigate('pacientes')}, '← Volver'),
      can('editPac') && tab==='info'  && Btn({sm:true,onClick:()=>setEdit(!edit)}, edit?'Cancelar':'✏️ Editar'),

      edit&&can('editPac')&&tab==='info' && Btn({sm:true,onClick:saveInfo,disabled:saving}, saving?'Guardando...':'💾 Guardar'),
      !can('editPac') && div({className:'restricted-banner',style:{margin:0}}, '🔒 Solo lectura')
    ),

    div({className:'patient-header-card'},
      div({className:'patient-avatar-lg'}, ini(pac.nombre,pac.apellido)),
      div({style:{flex:1}},
        e('h2',{}, pac.nombre+' '+pac.apellido),
        e('p',{}, (pac.email||'')+(pac.email&&pac.telefono?' — ':'')+( pac.telefono||'')),
        div({style:{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}},
          pac.objetivo && span({className:'patient-tag'}, 'Objetivo: '+pac.objetivo),
          pac.dni      && span({className:'patient-tag'}, 'DNI/CUIL: '+pac.dni),
          pac.fechaAlta&& span({className:'patient-tag'}, 'Alta: '+pac.fechaAlta),
          span({className:'patient-tag',style:{background:pac.estado==='Activo'?'rgba(100,200,130,.25)':'rgba(255,255,255,.1)'}}, pac.estado)
        )
      )

                Btn({cls:'btn-danger btn-sm',onClick:()=>swalConfirm('Eliminar plan','Esta acción no se puede deshacer').then(async r=>{
                  if(!r.isConfirmed) return;
                  const planes = (pac.planes||[]).filter((_,j)=>j!==i);
                  await onUpdate(pac.id,{planes}); setSelPac({...pac,planes}); showToast('Plan eliminado');
                })}, '✕ Eliminar')
              )
            )
      ))),
      // Modal agregar nuevo plan (solo cuando _editIdx no definido)
      showP && np._editIdx === undefined && Modal({title:'Agregar plan / informe',onClose:()=>setShowP(false),footer:div({},Btn({cls:'btn-secondary',onClick:()=>setShowP(false)},'Cancelar'),Btn({onClick:savePlan},'Guardar')),children:
        div({className:'form-grid'},
          div({className:'form-group full'},lbl({},'Nombre del plan / informe'),inp({value:np.nombre,onChange:ev=>setNp({...np,nombre:ev.target.value})})),
          div({className:'form-group'},lbl({},'Tipo'),inp({value:np.tipo,onChange:ev=>setNp({...np,tipo:ev.target.value})})),
          div({className:'form-group'},lbl({},'Fecha'),inp({type:'date',value:np.fecha,onChange:ev=>setNp({...np,fecha:ev.target.value})})),
          div({className:'form-group full'},lbl({},'Link Drive (opcional)'),inp({value:np.driveUrl||'',placeholder:'https://drive.google.com/...',onChange:ev=>setNp({...np,driveUrl:ev.target.value})}))
        )
      })
    )
  )
};


// ─── GOOGLE CALENDAR HELPER ───────────────────────────────────────────────────
function gcalUrl(turno) {
  const fecha = turno.fecha || '';
  const hora  = turno.hora  || '09:00';
  const [h, m] = hora.split(':').map(Number);
  const end_h  = h + 1 > 23 ? 23 : h + 1;
  const pad    = n => String(n).padStart(2,'0');
  const start  = fecha.replace(/-/g,'') + 'T' + pad(h) + pad(m) + '00';
  const end    = fecha.replace(/-/g,'') + 'T' + pad(end_h) + pad(m) + '00';
  const titulo = encodeURIComponent((turno.pacienteNombre||'Consulta') + ' — ' + (turno.tipo||'Consulta'));
  const detalle= encodeURIComponent([
    turno.consultorioNombre ? 'Consultorio: '+turno.consultorioNombre : '',
    turno.notas             ? 'Notas: '+turno.notas                  : '',
  ].filter(Boolean).join('\n'));
  const lugar  = encodeURIComponent(turno.consultorioNombre||'');
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text='    + titulo
    + '&dates='   + start + '/' + end
    + '&details=' + detalle
    + '&location='+ lugar;
}

// ─── GOOGLE CALENDAR — SEGUIMIENTO ───────────────────────────────────────────
function gcalSeguimientoUrl(pac, turnoFecha) {
  // Programa el seguimiento 15 días después del turno
  const base = new Date(turnoFecha + 'T00:00:00');
  base.setDate(base.getDate() + 15);
  const fecha = base.toISOString().split('T')[0];
  const pad   = n => String(n).padStart(2,'0');
  const start = fecha.replace(/-/g,'') + 'T090000';
  const end   = fecha.replace(/-/g,'') + 'T093000';
  const titulo  = encodeURIComponent('🌿 Dar Seguimiento — ' + (pac.nombre||'') + ' ' + (pac.apellido||''));
  const detalle = encodeURIComponent(
    'Seguimiento post-consulta del ' + turnoFecha + '\n' +
    'Paciente: ' + (pac.nombre||'') + ' ' + (pac.apellido||'') + '\n' +
    (pac.telefono ? 'Tel: ' + pac.telefono : '') + '\n' +
    'Consultarle cómo le está yendo con el plan alimentario.'
  );
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + '&text='    + titulo
    + '&dates='   + start + '/' + end
    + '&details=' + detalle;
}

// ─── AGENDA ───────────────────────────────────────────────────────────────────
function Agenda({turnos, pacs, can, showToast, navigate, consultorios, abrirPacHC, onFechaChange, onUpdate, onUpdEst, onUpdatePac, onAddIngreso, onDelIngreso, onDel}) {
  const hoy = today();
  const [selFecha,  _setSelFecha] = useState(hoy);
  const setSelFecha = d => { _setSelFecha(d); onFechaChange && onFechaChange(d); };
  const [filtCons,  setFiltCons]  = useState('todos');
  const [agrupar,   setAgrupar]   = useState(false);
  const [editTurno, setEditTurno] = useState(null); // turno en edicion

  const PALETA = ['#52b788','#e9c46a','#e76f51','#4a90d9','#9b59b6','#1abc9c','#e74c3c','#3498db'];
  const colorCons  = id => { const i = consultorios.findIndex(c=>c.id===id); return i>=0 ? PALETA[i%PALETA.length] : '#aaa'; };
  const nombreCons = id => { const c = consultorios.find(c=>c.id===id); return c ? c.nombre : 'Sin consultorio'; };

  const tDelDia = turnos
    .filter(t => t.fecha===selFecha && (filtCons==='todos' || t.consultorioId===filtCons))
    .sort((a,b) => a.hora.localeCompare(b.hora));

  const dateLabel = d => {
    if (d===hoy) return 'Hoy';
    try { return new Date(d+'T00:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}); }
    catch(ex){ return d; }
  };

  const COLS_AGENDA = [{key:'fecha',label:'Fecha'},{key:'hora',label:'Hora'},{key:'pacienteNombre',label:'Paciente'},
    {key:'tipo',label:'Tipo'},{key:'estado',label:'Estado'},{key:'asistencia',label:'Asistencia'},
    {key:'consultorioNombre',label:'Consultorio'},{key:'monto',label:'Monto (ARS)'},{key:'notas',label:'Notas'}];
  const withConsNombre = arr => arr.map(t => ({...t, consultorioNombre: nombreCons(t.consultorioId)}));

  const exportarDia = () => exportXLS(withConsNombre(tDelDia), COLS_AGENDA, 'agenda_'+selFecha);

  const exportarMes = () => {
    const mes = selFecha.slice(0,7);
    const data = withConsNombre(turnos.filter(t => t.fecha.startsWith(mes)).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora)));
    exportXLS(data, COLS_AGENDA, 'agenda_mes_'+mes);
  };

  const exportarAnio = () => {
    const anio = selFecha.slice(0,4);
    const data = withConsNombre(turnos.filter(t => t.fecha.startsWith(anio)).sort((a,b)=>a.fecha.localeCompare(b.fecha)||a.hora.localeCompare(b.hora)));
    exportXLS(data, COLS_AGENDA, 'agenda_anio_'+anio);
  };

  const guardarEdicion = async () => {
    if (!editTurno) return;
    const {id, ...data} = editTurno;
    await onUpdate(id, data);
    setEditTurno(null);
  };

  // ── Pedir medio de pago via SweetAlert ───────────────────────────────────
  const pedirMedioPago = () => Swal.fire({
    title: '💳 Medio de pago',
    input: 'select',
    inputOptions: {
      'Efectivo':        'Efectivo',
      'BBVA':            'BBVA',
      'Banco Provincia': 'Banco Provincia',
      'Mercado Pago':    'Mercado Pago',
      'Otros':           'Otros'
    },
    inputValue: 'Efectivo',
    showCancelButton: true,
    confirmButtonText: 'Confirmar cobro',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: 'var(--green-mid)',
    inputPlaceholder: 'Seleccioná el medio de pago'
  });

  // ── Helper: crea ingreso y devuelve su id ─────────────────────────────────
  const crearIngreso = async (t, metodoPago='Efectivo') => {
    const cons = consultorios.find(c => c.id === t.consultorioId);
    const comisionPct   = cons?.comision ? Number(cons.comision) : 0;
    const montoComision = comisionPct > 0 ? Math.round(t.monto * comisionPct / 100) : 0;
    const montoNeto     = t.monto - montoComision;
    const ref = await onAddIngreso({
      descripcion:       t.pacienteNombre + ' — ' + t.tipo,
      tipo:              'consulta',
      fecha:             t.fecha,
      monto:             t.monto,
      montoNeto,
      montoComision,
      comisionPct,
      consultorioId:     t.consultorioId || '',
      consultorioNombre: nombreCons(t.consultorioId),
      metodoPago,
      turnoId:           t.id,
      origenTurno:       true
    });
    return ref?.id || null;
  };

  // ── Registrar asistencia (primera vez) ────────────────────────────────────
  const registrarAsistencia = async (t, tipo) => {
    const pac = pacs.find(p => p.id === t.pacienteId);
    if (!pac) { showToast('Paciente no encontrado','error'); return; }
    const iconos = {asistio:'✅ Asistió', noAsistio:'❌ No asistió', reprogramo:'🔄 Reprogramó'};
    const tipoLabel = iconos[tipo];
    // Si asistió → pedir medio de pago antes de continuar
    let metodoPago = 'Efectivo';
    if (tipo === 'asistio' && t.monto > 0) {
      const res = await pedirMedioPago();
      if (res.isDismissed) return; // canceló
      metodoPago = res.value || 'Efectivo';
    }
    const hito = {
      fecha: t.fecha, hora: t.hora, tipo,
      nota: tipoLabel + ' — ' + t.tipo + (t.consultorioId ? ' — ' + nombreCons(t.consultorioId) : '') + (t.notas ? ' | ' + t.notas : ''),
      turnoId: t.id, peso: ''
    };
    const consultas = [hito, ...(pac.consultas || [])];
    await onUpdatePac(pac.id, { consultas, ultimaConsulta: t.fecha });
    const nuevoEstado = tipo === 'asistio' ? 'Confirmado' : tipo === 'noAsistio' ? 'Cancelado' : t.estado;
    let ingresoId = null;
    if (tipo === 'asistio' && t.monto > 0) ingresoId = await crearIngreso(t, metodoPago);
    await onUpdate(t.id, { asistencia: tipo, estado: nuevoEstado, ingresoId: ingresoId || null });
    if (tipo === 'asistio') {
      const segUrl = gcalSeguimientoUrl(pac, t.fecha);
      showToast('✅ Asistencia registrada — cobro por '+metodoPago+' guardado — <a href="'+segUrl+'" target="_blank" style="color:#fff;font-weight:700;text-decoration:underline">🌿 Agendar Seguimiento (+15 días)</a>');
    } else {
      showToast(tipoLabel + ' registrado');
    }
  };

  // ── Cambiar asistencia ya registrada ──────────────────────────────────────
  const cambiarAsistencia = async (t, nuevoTipo) => {
    const pac = pacs.find(p => p.id === t.pacienteId);
    const iconos = {asistio:'✅ Asistió', noAsistio:'❌ No asistió', reprogramo:'🔄 Reprogramó', agendado:'📅 Agendado'};
    const tipoLabel = iconos[nuevoTipo]||nuevoTipo;
    // 1. Eliminar ingreso previo si el estado anterior era 'asistio'
    if (t.asistencia === 'asistio' && t.ingresoId) {
      try { await onDelIngreso(t.ingresoId); } catch(e) { console.warn('No se pudo eliminar ingreso previo', e); }
    }
    // 2. Actualizar hito en historial del paciente
    if (pac) {
      const yaExiste = (pac.consultas || []).some(h => h.turnoId === t.id);
      const consultas = yaExiste
        ? (pac.consultas || []).map(h => h.turnoId === t.id
            ? { ...h, tipo: nuevoTipo, nota: tipoLabel + ' — ' + t.tipo + (t.consultorioId ? ' — ' + nombreCons(t.consultorioId) : '') }
            : h)
        : [{ fecha:t.fecha, hora:t.hora, tipo:nuevoTipo, nota:tipoLabel+' — '+t.tipo, turnoId:t.id, peso:'' }, ...(pac.consultas||[])];
      await onUpdatePac(pac.id, { consultas });
    }
    // Si se quiere volver a 'agendado' → limpiar asistencia completamente
    if (nuevoTipo === 'agendado') {
      await onUpdate(t.id, { asistencia: null, ingresoId: null, estado: 'Pendiente' });
      showToast('Turno vuelto a estado Agendado');
      return;
    }
    // 3. Crear nuevo ingreso si el nuevo tipo es 'asistio'
    let nuevoIngresoId = null;
    if (nuevoTipo === 'asistio' && t.monto > 0) {
      const res = await pedirMedioPago();
      if (!res.isDismissed) nuevoIngresoId = await crearIngreso(t, res.value || 'Efectivo');
    }
    // 4. Actualizar turno
    const nuevoEstado = nuevoTipo==='asistio' ? 'Confirmado' : nuevoTipo==='noAsistio' ? 'Cancelado' : t.estado;
    await onUpdate(t.id, { asistencia: nuevoTipo, estado: nuevoEstado, ingresoId: nuevoIngresoId });
    showToast('Asistencia actualizada: ' + tipoLabel);
  };

  // Sub-componente tarjeta de turno
  const TurnoCard = ({t}) => {
    const [cambiando, setCambiando] = useState(false);
    const color = colorCons(t.consultorioId);
    const asistBadge = {
      asistio:    {cls:'asist-badge asistio',    txt:'✅ Asistió'},
      noAsistio:  {cls:'asist-badge no-asistio', txt:'❌ No asistió'},
      reprogramo: {cls:'asist-badge reprogramo', txt:'🔄 Reprogramó'},
    }[t.asistencia];

    return div({key:t.id,
      className:'agenda-slot'+(t.estado==='Pendiente'?' pendiente':t.estado==='Cancelado'?' cancelado':''),
      style:{borderLeftColor:color, borderLeftWidth:4, borderLeftStyle:'solid'}},
      div({},
        div({style:{fontSize:'1rem',fontWeight:700,color:'var(--green-mid)'}}, t.hora),
        div({style:{fontSize:'.7rem',color:'var(--text-muted)'}}, ars(t.monto))
      ),
      div({style:{flex:1}},
        div({
          style:{fontWeight:500,fontSize:'.9rem',cursor:'pointer',color:'var(--green-mid)',textDecoration:'underline dotted'},
          title:'Ver historia clínica',
          onClick:()=>{ const p=pacs.find(p=>p.id===t.pacienteId); if(p) abrirPacHC(p); }
        }, t.pacienteNombre),
        div({style:{fontSize:'.78rem',color:'var(--text-muted)'}}, t.tipo),
        !agrupar && t.consultorioId && span({style:{
          fontSize:'.68rem',padding:'1px 7px',borderRadius:10,marginTop:3,display:'inline-block',
          background:color+'22',color:color,fontWeight:500
        }}, nombreCons(t.consultorioId)),
        t.notas && div({style:{fontSize:'.72rem',color:'var(--text-muted)',marginTop:2}}, 'Nota: '+t.notas),
        // Badge asistencia + botón cambiar
        asistBadge && div({style:{display:'flex',alignItems:'center',gap:6,marginTop:4,flexWrap:'wrap'}},
          span({className:asistBadge.cls}, asistBadge.txt),
          can('editTurno') && e('button',{
            style:{fontSize:'.65rem',padding:'1px 7px',borderRadius:10,background:'#f0f0f0',border:'1px solid #ddd',cursor:'pointer',color:'var(--text-muted)',lineHeight:1.6},
            onClick:()=>setCambiando(v=>!v)
          }, cambiando ? '✕ cerrar' : '✏️ cambiar')
        ),
        // Opciones inline para cambiar asistencia
        cambiando && can('editTurno') && div({style:{marginTop:6,display:'flex',gap:4,flexWrap:'wrap'}},
          ...['asistio','noAsistio','reprogramo','agendado']
            .filter(op => op !== t.asistencia)
            .map(op => {
              const labels = {asistio:'✅ Asistió', noAsistio:'❌ No asistió', reprogramo:'🔄 Reprogramó', agendado:'📅 Agendado'};
              const clss   = {asistio:'asist-asistio', noAsistio:'asist-no-asistio', reprogramo:'asist-reprogramo', agendado:'asist-reprogramo'};
              return e('button',{
                key:op, className:'asist-btn '+clss[op],
                onClick:async ()=>{ setCambiando(false); await cambiarAsistencia(t, op); }
              }, labels[op]);
            })
        )
      ),
      div({style:{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}},
        Badge({cls:t.estado==='Confirmado'?'bg':t.estado==='Pendiente'?'by':'br'}, t.estado),
        // Botones primera asistencia — solo si todavía no tiene
        can('editTurno') && !t.asistencia && div({style:{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end',marginBottom:2}},
          e('button',{className:'asist-btn asist-asistio',    onClick:()=>registrarAsistencia(t,'asistio')},    '✅ Asistió'),
          e('button',{className:'asist-btn asist-no-asistio', onClick:()=>registrarAsistencia(t,'noAsistio')}, '❌ No asistió'),
          e('button',{className:'asist-btn asist-reprogramo', onClick:()=>registrarAsistencia(t,'reprogramo')},'🔄 Reprogramó')
        ),
        can('editTurno') && div({style:{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end'}},
          !t.asistencia && t.estado!=='Confirmado' && Btn({cls:'btn-ghost',sm:true,onClick:()=>onUpdEst(t.id,'Confirmado')}, 'OK'),
          !t.asistencia && t.estado!=='Cancelado'  && Btn({cls:'btn-ghost',sm:true,onClick:()=>onUpdEst(t.id,'Cancelado')},  '✕'),
          e('a',{
            href:gcalUrl({...t, consultorioNombre:nombreCons(t.consultorioId)}),
            target:'_blank', rel:'noopener',
            title:'Agregar a Google Calendar',
            style:{display:'inline-flex',alignItems:'center',gap:3,padding:'3px 9px',
                   borderRadius:10,background:'#eff6ff',border:'1px solid #bfdbfe',
                   fontSize:'.72rem',color:'#4285f4',fontWeight:600,textDecoration:'none',
                   cursor:'pointer',whiteSpace:'nowrap'}
          }, '📅 Agregar a Calendar'),
          Btn({cls:'btn-edit btn btn-sm',sm:true,onClick:()=>setEditTurno({...t})}, '✏️'),
          Btn({cls:'btn-danger',sm:true,onClick:()=>onDel(t.id)}, '🗑')
        )
      )
    );
  };

  // Grupos por consultorio
  const grupos = () => {
    const map = {};
    consultorios.forEach(ct => { map[ct.id] = {nombre:ct.nombre, color:colorCons(ct.id), turnos:[]}; });
    map['__sin'] = {nombre:'Sin consultorio', color:'#aaa', turnos:[]};
    tDelDia.forEach(t => {
      const key = (t.consultorioId && map[t.consultorioId]) ? t.consultorioId : '__sin';
      map[key].turnos.push(t);
    });
    return Object.entries(map).filter(([,g]) => g.turnos.length > 0);
  };

  // ── Resumen comisiones del día (solo asistidos con consultorio con %) ─────
  const resumenComisionesDia = () => {
    const asistidos = tDelDia.filter(t=>t.asistencia==='asistio' && Number(t.monto)>0 && t.consultorioId);
    const resumen = {};
    asistidos.forEach(t => {
      const cons = consultorios.find(c=>c.id===t.consultorioId);
      if (!cons || !Number(cons.comision)) return;
      if (!resumen[t.consultorioId]) resumen[t.consultorioId] = {nombre:cons.nombre, pct:Number(cons.comision), bruto:0, comision:0, n:0};
      resumen[t.consultorioId].bruto    += Number(t.monto);
      resumen[t.consultorioId].comision += Math.round(Number(t.monto)*Number(cons.comision)/100);
      resumen[t.consultorioId].n++;
    });
    const filas = Object.values(resumen);
    if (!filas.length) return null;
    return div({style:{marginTop:20,borderTop:'2px solid var(--cream-dark)',paddingTop:14}},
      div({style:{fontSize:'.75rem',fontWeight:700,color:'var(--text-mid)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:10}},
        '💸 A dejar hoy por consultorio'
      ),
      ...filas.map(f => div({key:f.nombre,
        style:{display:'flex',justifyContent:'space-between',alignItems:'center',
               padding:'10px 14px',background:'white',borderRadius:'var(--radius-sm)',
               border:'1px solid var(--cream-dark)',marginBottom:6}},
        div({},
          div({style:{fontWeight:600,fontSize:'.85rem',color:'var(--text-dark)'}}, f.nombre),
          div({style:{fontSize:'.72rem',color:'var(--text-muted)',marginTop:2}},
            f.n+' paciente'+(f.n!==1?'s':'')+' · bruto '+ars(f.bruto)+' · comisión '+f.pct+'%'
          )
        ),
        div({style:{fontWeight:700,color:'#c0392b',fontSize:'.95rem'}}, ars(f.comision))
      ))
    );
  };

  return div({},
    // TOOLBAR
    div({style:{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}},
      consultorios.length > 0 && div({style:{display:'flex',alignItems:'center',gap:6}},
        span({style:{fontSize:'.8rem',color:'var(--text-muted)',fontWeight:500}}, 'Consultorio:'),
        e('select',{
          value:filtCons, onChange:ev=>setFiltCons(ev.target.value),
          style:{fontSize:'.82rem',padding:'6px 10px',borderRadius:'var(--radius-sm)',border:'1px solid #ddd',background:'white'}
        },
          e('option',{value:'todos'},'Todos'),
          ...consultorios.map(ct=>e('option',{key:ct.id,value:ct.id},ct.nombre))
        )
      ),
      consultorios.length > 0 && Btn({
        cls: agrupar ? 'btn-primary' : 'btn-secondary', sm:true, onClick:()=>setAgrupar(!agrupar)
      }, agrupar ? '⊞ Agrupado' : '⊞ Agrupar por consultorio'),
      div({style:{flex:1}}),
      div({style:{position:'relative',display:'inline-block'}},
        e('details',{style:{display:'inline-block'}},
          e('summary',{style:{
            padding:'6px 12px',background:'var(--cream-dark)',border:'1.5px solid #ddd',borderRadius:'var(--radius-sm)',
            cursor:'pointer',fontSize:'.82rem',fontWeight:500,color:'var(--text-mid)',listStyle:'none',display:'inline-flex',alignItems:'center',gap:6
          }}, '📥 Exportar ▾'),
          div({style:{
            position:'absolute',right:0,top:'calc(100% + 4px)',background:'white',border:'1px solid #ddd',
            borderRadius:'var(--radius-sm)',boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:200,minWidth:160,overflow:'hidden'
          }},
            ...[ ['📅 Este día',  exportarDia],
                 ['📆 Este mes',  exportarMes],
                 ['📊 Este año',  exportarAnio]
            ].map(([lbl_,fn]) => div({
              key:lbl_, onClick:fn,
              style:{padding:'10px 16px',cursor:'pointer',fontSize:'.82rem',color:'var(--text-dark)',borderBottom:'1px solid var(--cream-dark)',transition:'background .15s'},
              onMouseOver:ev=>ev.currentTarget.style.background='var(--green-mist)',
              onMouseOut:ev=>ev.currentTarget.style.background='white'
            }, lbl_))
          )
        )
      ),
      can('editTurno') && Btn({sm:true,onClick:()=>navigate('add-turno')}, '+ Nuevo turno')
    ),

    // GRILLA
    div({className:'agenda-cal-grid',style:{display:'grid',gridTemplateColumns:'300px 1fr',gap:24,alignItems:'start'}},
      e(MiniCalendar, {turnos, selectedDate:selFecha, onSelectDate:setSelFecha}),
      div({},
        div({style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
